<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
@page { margin: 0; size: 1200px 630px; }

@font-face {
  font-family: 'Bebas';
  src: url('fonts/bebas-neue.woff2') format('woff2');
  font-weight: 400;
  font-style: normal;
  font-display: block;
}
@font-face {
  font-family: 'Montserrat';
  src: url('fonts/montserrat-400.woff2') format('woff2');
  font-weight: 400;
  font-style: normal;
  font-display: block;
}
@font-face {
  font-family: 'Montserrat';
  src: url('fonts/montserrat-700.woff2') format('woff2');
  font-weight: 700;
  font-style: normal;
  font-display: block;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  background: #0A1628;
  font-family: 'Montserrat', 'Arial', sans-serif;
  position: relative;
}

/* Leather/noise texture overlay */
.noise-layer {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0.08;
}

/* Top gold accent bar */
.bar-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, #C99959, #E4B86A, #C99959);
  z-index: 10;
}

/* Bottom gold accent bar */
.bar-bottom {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, #C99959, #E4B86A, #C99959);
  z-index: 10;
}

/* Main layout */
.layout {
  position: absolute;
  inset: 4px 0;
  display: flex;
  z-index: 5;
}

/* Left column - 55% */
.col-left {
  width: 55%;
  padding: 52px 56px 52px 64px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
}

/* Right column - 45% */
.col-right {
  width: 45%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 48px 40px 20px;
}

/* Diagonal divider */
.divider {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 55%;
  width: 1px;
  background: linear-gradient(180deg, transparent 0%, rgba(201,153,89,0.3) 20%, rgba(228,184,106,0.5) 50%, rgba(201,153,89,0.3) 80%, transparent 100%);
  z-index: 6;
  transform: skewX(-3deg);
}

/* Eyebrow text */
.eyebrow {
  font-family: 'Montserrat', 'Arial', sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 3.5px;
  color: #C99959;
  text-transform: uppercase;
  margin-bottom: 22px;
  opacity: 0.85;
}

/* Firm name */
.firm-name {
  font-family: 'Bebas', 'Impact', sans-serif;
  font-size: 94px;
  line-height: 0.92;
  color: #FFFFFF;
  letter-spacing: 2px;
  margin-bottom: 20px;
  text-shadow: 0 2px 40px rgba(0,0,0,0.5);
}

/* Subtitle */
.subtitle {
  font-family: 'Montserrat', 'Arial', sans-serif;
  font-weight: 700;
  font-size: 11.5px;
  letter-spacing: 4px;
  color: #C99959;
  text-transform: uppercase;
  margin-bottom: 36px;
  opacity: 0.9;
}

/* Divider line */
.gold-line {
  width: 60px;
  height: 1.5px;
  background: linear-gradient(90deg, #C99959, #E4B86A);
  margin-bottom: 28px;
  opacity: 0.7;
}

/* Contact info */
.contact-block {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.phone {
  font-family: 'Montserrat', 'Arial', sans-serif;
  font-weight: 700;
  font-size: 15px;
  color: #E4B86A;
  letter-spacing: 1px;
}

.website {
  font-family: 'Montserrat', 'Arial', sans-serif;
  font-weight: 400;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 2px;
  text-transform: lowercase;
}

/* MM Monogram */
.monogram-frame {
  position: relative;
  width: 340px;
  height: 340px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Inner border frame */
.monogram-frame::before {
  content: '';
  position: absolute;
  inset: 0;
  border: 1px solid rgba(201,153,89,0.25);
  border-radius: 4px;
}

/* Corner accents */
.monogram-frame::after {
  content: '';
  position: absolute;
  top: 12px; right: 12px; bottom: 12px; left: 12px;
  border-top: 2px solid rgba(228,184,106,0.15);
  border-bottom: 2px solid rgba(228,184,106,0.15);
}

.monogram-inner {
  position: relative;
  z-index: 2;
  text-align: center;
}

.mm-text {
  font-family: 'Bebas', 'Impact', sans-serif;
  font-size: 210px;
  line-height: 1;
  color: rgba(201,153,89,0.12);
  letter-spacing: -8px;
  display: block;
  text-shadow: 0 0 80px rgba(201,153,89,0.08);
}

/* Radial glow behind monogram */
.monogram-glow {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(201,153,89,0.05) 0%, transparent 70%);
}

/* Corner flourishes on right column */
.corner-tl, .corner-br {
  position: absolute;
  width: 30px;
  height: 30px;
}
.corner-tl {
  top: 30px; left: 30px;
  border-top: 1.5px solid rgba(201,153,89,0.4);
  border-left: 1.5px solid rgba(201,153,89,0.4);
}
.corner-br {
  bottom: 30px; right: 60px;
  border-bottom: 1.5px solid rgba(201,153,89,0.4);
  border-right: 1.5px solid rgba(201,153,89,0.4);
}

/* Bottom tagline bar */
.tagline-bar {
  position: absolute;
  bottom: 24px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 10;
}

.tagline-text {
  font-family: 'Montserrat', 'Arial', sans-serif;
  font-weight: 700;
  font-size: 9px;
  letter-spacing: 6px;
  color: rgba(201,153,89,0.6);
  text-transform: uppercase;
  font-variant: small-caps;
}

/* Background depth gradient */
.bg-gradient {
  position: absolute;
  inset: 0;
  z-index: 2;
  background:
    radial-gradient(ellipse 40% 60% at 20% 50%, rgba(27,42,74,0.6) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 80% 30%, rgba(10,22,40,0.8) 0%, transparent 60%);
}
</style>
</head>
<body>

<!-- Background depth -->
<div class="bg-gradient"></div>

<!-- SVG noise texture for leather feel -->
<svg class="noise-layer" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
  <rect width="1200" height="630" filter="url(#noise)" opacity="1" fill="white"/>
</svg>

<!-- Gold bars -->
<div class="bar-top"></div>
<div class="bar-bottom"></div>

<!-- Diagonal divider -->
<div class="divider"></div>

<!-- Main layout -->
<div class="layout">

  <!-- LEFT COLUMN -->
  <div class="col-left">
    <div class="eyebrow">Established 2012 &nbsp;&#8226;&nbsp; Pretoria, South Africa</div>

    <div class="firm-name">MASEKELA<br>MASENYA INC</div>

    <div class="subtitle">Attorneys &nbsp;&middot;&nbsp; Notaries &nbsp;&middot;&nbsp; Conveyancers</div>

    <div class="gold-line"></div>

    <div class="contact-block">
      <div class="phone">+27 87 265 1961</div>
      <div class="website">maslaw.co.za</div>
    </div>
  </div>

  <!-- RIGHT COLUMN -->
  <div class="col-right">
    <div class="corner-tl"></div>
    <div class="corner-br"></div>
    <div class="monogram-glow"></div>
    <div class="monogram-frame">
      <div class="monogram-inner">
        <span class="mm-text">MM</span>
      </div>
    </div>
  </div>

</div>

<!-- Bottom tagline -->
<div class="tagline-bar">
  <span class="tagline-text">Justice With Distinction</span>
</div>

</body>
</html>
